<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameNet - Multiplayer Oyun Platformu</title>
    <link rel="stylesheet" href="/src/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-bg text-gray-100 overflow-x-hidden">
    <!-- Dekoratif Arka Plan Glowları -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-accent/10 blur-[120px] -z-10 rounded-full"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-500/5 blur-[120px] -z-10 rounded-full"></div>

    <!-- Navbar -->
    <nav class="border-b border-white/5 bg-black/40 backdrop-blur-2xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-accent rounded-lg flex items-center justify-center shadow-[0_0_20px_var(--color-accent-glow)]">
                    <span class="text-white font-black italic">GN</span>
                </div>
                <h1 class="text-xl font-black tracking-[-0.05em] text-white">GAMENET<span class="text-accent">.IO</span></h1>
            </div>
            <div id="user-info-container" class="hidden flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-success shadow-[0_0_8px_#00ff88]"></div>
                    <span id="user-info" class="text-[10px] font-mono font-black text-white uppercase tracking-[0.2em]"></span>
                </div>
                <button onclick="location.reload()" class="text-[10px] text-gray-500 hover:text-accent transition uppercase font-black tracking-widest border-l border-white/10 pl-6 h-10">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 min-h-[calc(100vh-64px)] flex items-center justify-center">
        
        <!-- Giriş Ekranı -->
        <section id="login-screen" class="w-full max-w-md animate-fade">
            <div class="panel p-10 text-center space-y-8">
                <div class="space-y-4">
                    <div class="w-20 h-20 bg-accent/10 rounded-2xl flex items-center justify-center mx-auto border border-accent/20">
                        <span class="text-4xl">🎮</span>
                    </div>
                    <h2 class="text-3xl font-black text-white tracking-tight">Hoş Geldiniz</h2>
                    <p class="text-gray-500 text-sm">Oyun dünyasına katılmak için bir takma ad belirleyin.</p>
                </div>
                <div class="space-y-4">
                    <input type="text" id="nickname-input" class="input-field text-center" placeholder="Takma Adın..." maxlength="15">
                    <button id="join-btn" class="btn-primary w-full shadow-lg shadow-accent/20">PLATFORMA KATIL</button>
                </div>
            </div>
        </section>

        <!-- Lobi Ekranı -->
        <section id="lobby-screen" class="hidden w-full max-w-5xl animate-fade">
            <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-12">
                <div class="space-y-2">
                    <h2 class="text-4xl font-black text-white tracking-tighter">OYUN ODALARI</h2>
                    <p class="text-gray-500 font-mono text-xs uppercase tracking-widest">Aktif odaları keşfet veya kendininkini kur</p>
                </div>
                <div class="flex gap-3">
                    <button id="quick-match-btn" class="btn-secondary flex items-center gap-2 group">
                        <span class="group-hover:animate-bounce">⚡</span> HIZLI KATIL
                    </button>
                    <button id="create-room-btn" class="btn-primary flex items-center gap-2">
                        <span>+</span> ODA OLUŞTUR
                    </button>
                </div>
            </div>

            <div id="room-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4">
                <!-- Odalar dinamik olarak buraya gelecek -->
            </div>
        </section>

        <!-- Oyun Odası Ekranı -->
        <section id="room-screen" class="hidden w-full max-w-6xl animate-fade grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <!-- Sol Panel: Oyuncular & Bilgi -->
            <div class="lg:col-span-3 space-y-6">
                <div class="panel p-6">
                    <h3 class="font-black text-xs text-gray-500 uppercase tracking-widest mb-4">Oyuncular</h3>
                    <ul id="player-list" class="space-y-2"></ul>
                </div>
                <button id="leave-room-btn" class="btn-secondary w-full text-sm py-3 text-red-400 border border-red-900/30 hover:bg-red-950/20">ODADAN AYRIL</button>
            </div>

            <!-- Orta Panel: Oyun Alanı -->
            <div class="lg:col-span-6">
                <div class="panel min-h-[500px] flex items-center justify-center p-8 relative overflow-hidden">
                    <div id="game-container" class="w-full"></div>
                </div>
            </div>

            <!-- Sağ Panel: Sohbet -->
            <div class="lg:col-span-3">
                <div class="panel flex flex-col h-[500px]">
                    <div class="p-4 border-b border-border bg-neutral-900/50">
                        <h3 class="font-black text-xs text-gray-500 uppercase tracking-widest">SOHBET</h3>
                    </div>
                    <div id="chat-messages" class="flex-grow overflow-y-auto p-4 space-y-3">
                        <!-- Mesajlar -->
                    </div>
                    <div class="p-4 border-t border-border bg-neutral-900/50">
                        <div class="flex gap-2">
                            <input type="text" id="chat-input" class="bg-neutral-900 border border-border rounded-lg px-4 py-2 text-sm w-full focus:outline-none focus:border-accent" placeholder="Mesaj yaz...">
                            <button id="send-chat-btn" class="bg-accent text-white px-3 py-2 rounded-lg hover:bg-accent-hover transition">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                    <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576 6.636 10.07Zm6.787-8.201L1.591 6.602l4.339 2.76 7.493-7.493Z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Oda Oluşturma Modalı -->
    <div id="create-room-modal" class="hidden fixed inset-0 z-50 bg-bg/80 backdrop-blur-sm items-center justify-center p-6">
        <div class="panel w-full max-w-md p-8 space-y-6 animate-fade">
            <h3 class="text-2xl font-black text-white">Yeni Oda Oluştur</h3>
            <div class="space-y-4">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Oda İsmi</label>
                    <input type="text" id="room-name-input" class="input-field" placeholder="Efsanevi Oda...">
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Oyun Seç</label>
                    <select id="game-type-select" class="input-field">
                        <option value="tictactoe">Tic Tac Toe</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-3 pt-4">
                <button id="cancel-create-btn" class="btn-secondary flex-grow">İPTAL</button>
                <button id="confirm-create-btn" class="btn-primary flex-grow">OLUŞTUR</button>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script type="module" src="/src/client/app.ts"></script>
</body>
</html>
